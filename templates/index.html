<!DOCTYPE html>
<html>
<head>

<title>FreeDevAPI Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins';
background:#0f172a;
color:white;
}

.navbar{
background:#020617;
}

.search-bar{
max-width:600px;
margin:auto;
}

.api-card{
background:#1e293b;
border-radius:15px;
padding:20px;
transition:0.3s;
height:100%;
}

.api-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.badge{
background:#6366f1;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold">🚀 FreeDevAPI Hub</a>
</div>
</nav>

<div class="container mt-4">

<h2 class="text-center mb-4">
500+ Free Developer APIs
</h2>

<div class="search-bar mb-4">

<input 
id="search"
class="form-control form-control-lg"
placeholder="Search APIs..."
onkeyup="searchAPI()"
>

</div>

<div class="row" id="apiContainer">

{% for api in apis %}

<div class="col-lg-4 col-md-6 mb-4 api-item">

<div class="api-card">

<h5>{{api.API}}</h5>

<p class="text-muted">
{{api.Description}}
</p>

<span class="badge">
{{api.Category}}
</span>

<br><br>

<a href="{{api.Link}}" target="_blank" class="btn btn-primary btn-sm">

Open API

</a>

</div>

</div>

{% endfor %}

</div>

</div>

<script>

function searchAPI(){

let input = document.getElementById("search").value.toLowerCase()

let cards = document.querySelectorAll(".api-item")

cards.forEach(card => {

if(card.innerText.toLowerCase().includes(input))
card.style.display="block"
else
card.style.display="none"

})

}

</script>

</body>
</html>
