<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — DevAPI Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060B17;--surface:#0D1626;--surface2:#121E33;--border:rgba(255,255,255,0.08);--accent:#00E5FF;--text:#E2EAF4;--muted:#6B7E99;--err:#F87171}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;background:rgba(6,11,23,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#0080FF);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;color:var(--text)}
.nav-title span{color:var(--accent)}

/* MAIN */
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 1rem;position:relative;z-index:1}
.glow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(0,229,255,.07) 0%,transparent 70%);pointer-events:none}

.card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:40px;position:relative}
.card::before{content:'';position:absolute;top:0;left:40px;right:40px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:1px}

.card-head{text-align:center;margin-bottom:32px}
.card-icon{width:52px;height:52px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 16px}
.card-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;letter-spacing:-.5px;margin-bottom:6px}
.card-sub{color:var(--muted);font-size:.875rem}

/* FORM */
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.1)}
.form-input::placeholder{color:var(--muted)}

.btn-primary{width:100%;background:var(--accent);border:none;border-radius:10px;padding:13px;color:#060B17;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px;letter-spacing:.02em}
.btn-primary:hover{background:#33EAFF;box-shadow:0 6px 20px rgba(0,229,255,.3);transform:translateY(-1px)}

.form-footer{text-align:center;margin-top:22px;color:var(--muted);font-size:.85rem}
.form-footer a{color:var(--accent);text-decoration:none;font-weight:500}
.form-footer a:hover{text-decoration:underline}

.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--muted);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:18px 2rem;text-align:center;color:var(--muted);font-size:.78rem}
.footer strong{color:var(--text)}
</style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-brand">
    <div class="nav-logo">⚡</div>
    <span class="nav-title">Dev<span>API</span></span>
  </a>
</nav>

<main class="page">
  <div class="glow"></div>
  <div class="card">
    <div class="card-head">
      <div class="card-icon">🔐</div>
      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Sign in to your DevAPI Hub account</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button class="btn-primary" type="submit">Sign In →</button>
    </form>

    <div class="divider">or</div>

    <p class="form-footer">
      New to DevAPI Hub? <a href="/signup">Create an account</a>
    </p>
  </div>
</main>

<footer class="footer">© 2025 <strong>DevAPI Hub</strong> · Built for developers</footer>
</body>
</html>
